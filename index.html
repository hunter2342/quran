<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع قرآن ريلز الذكي | Smart Quran Reels</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-white font-cairo h-screen overflow-hidden flex flex-col">

    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <i data-lucide="clapperboard" class="text-emerald-500"></i>
            <h1 class="text-xl font-bold">صانع قرآن ريلز</h1>
        </div>
        <button id="export-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition">
            <i data-lucide="download"></i>
            تصدير الفيديو (WebM)
        </button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-1/3 bg-gray-800 border-l border-gray-700 p-6 overflow-y-auto custom-scrollbar flex flex-col gap-6">
            
            <section class="space-y-3">
                <h2 class="text-lg font-bold flex items-center gap-2 text-emerald-400">
                    <i data-lucide="image"></i> الخلفية (فيديو / صورة)
                </h2>
                <input type="file" id="bg-upload" accept="video/mp4, image/*" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-white hover:file:bg-gray-600 cursor-pointer">
            </section>

            <hr class="border-gray-700">

            <section class="space-y-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-emerald-400">
                    <i data-lucide="book-open"></i> اختيار المكتبة القرآنية
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">السورة</label>
                        <select id="surah-select" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white outline-none focus:border-emerald-500">
                            <option value="">جاري تحميل السور...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">القارئ</label>
                        <select id="edition-select" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white outline-none focus:border-emerald-500">
                            <option value="ar.alafasy">مشاري العفاسي</option>
                            <option value="ar.minshawi">محمد صديق المنشاوي</option>
                            <option value="ar.abdulbasit">عبد الباسط عبد الصمد</option>
                            <option value="ar.husary">محمود خليل الحصري</option>
                            <option value="ar.ghamadi">سعد الغامدي</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">من آية</label>
                        <input type="number" id="ayah-start" min="1" value="1" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">إلى آية</label>
                        <input type="number" id="ayah-end" min="1" value="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white outline-none focus:border-emerald-500">
                    </div>
                </div>
                <button id="fetch-quran-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                    <i data-lucide="cloud-download"></i> جلب الآيات والصوت
                </button>
            </section>

            <hr class="border-gray-700">

            <section class="space-y-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-emerald-400">
                    <i data-lucide="palette"></i> تخصيص الخط والمظهر
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">نوع الخط</label>
                        <select id="font-family" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white outline-none">
                            <option value="'Amiri', serif">Amiri (مصحف)</option>
                            <option value="'Cairo', sans-serif">Cairo</option>
                            <option value="'Tajawal', sans-serif">Tajawal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">لون النص</label>
                        <input type="color" id="text-color" value="#ffffff" class="w-full h-10 rounded cursor-pointer bg-transparent border-0">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">حجم الخط</label>
                    <input type="range" id="font-size" min="20" max="100" value="45" class="w-full accent-emerald-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">الموقع العمودي</label>
                    <input type="range" id="text-position" min="10" max="90" value="50" class="w-full accent-emerald-500">
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="text-shadow" checked class="accent-emerald-500 w-4 h-4">
                    <label for="text-shadow" class="text-sm">إضافة ظل للنص (Shadow)</label>
                </div>
            </section>

            <hr class="border-gray-700">

            <section class="space-y-3">
                <h2 class="text-lg font-bold flex items-center gap-2 text-emerald-400">
                    <i data-lucide="play-circle"></i> التحكم بالمعاينة
                </h2>
                <div class="flex items-center gap-4 bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <button id="play-pause-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-full transition flex-shrink-0">
                        <i data-lucide="play" id="play-icon"></i>
                    </button>
                    <div class="flex flex-col">
                        <span id="audio-status" class="text-sm font-bold text-white">لم يتم جلب آيات بعد</span>
                        <span id="surah-subtitle" class="text-xs text-gray-400">اختر السورة واضغط جلب</span>
                    </div>
                </div>
            </section>

        </aside>

        <section class="w-2/3 bg-gray-950 flex justify-center items-center p-8 relative">
            <div id="preview-wrapper" class="relative bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800">
                <video id="bg-video" class="absolute inset-0 w-full h-full object-cover hidden" loop muted playsinline></video>
                <img id="bg-image" class="absolute inset-0 w-full h-full object-cover hidden" alt="Background">
                
                <div class="absolute inset-0 bg-black/30 z-0"></div>

                <div id="text-container" class="absolute w-full px-6 flex flex-col items-center text-center z-10 transition-all duration-300" style="top: 50%; transform: translateY(-50%);">
                    <p id="preview-quran" class="text-white drop-shadow-2xl leading-relaxed fade-in" style="font-family: 'Amiri', serif; font-size: 45px;">
                        بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                    </p>
                    <p id="preview-sub" class="text-gray-200 mt-4 text-lg font-cairo drop-shadow-md fade-in">
                        الفاتحة
                    </p>
                </div>
            </div>
        </section>

    </main>

    <audio id="audio-player" class="hidden" crossorigin="anonymous"></audio>
    <canvas id="export-canvas" width="1080" height="1920" class="hidden"></canvas>

    <script src="script.js"></script>
</body>
</html>
